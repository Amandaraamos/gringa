<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | The Health Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-700 font-sans">
    <main class="max-w-2xl mx-auto py-20 px-6 bg-white shadow-sm mt-10 rounded-2xl text-center">
        <h1 class="text-3xl font-black text-slate-900 mb-4">Get in Touch</h1>
        <p class="text-slate-500 mb-10">Have questions about our research? Our editorial team is here to help.</p>
        
        <div class="space-y-6 text-left">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                <input type="text" placeholder="contact@thehealthdailyreport.com" class="w-full p-4 bg-slate-100 border-none rounded-xl" disabled>
            </div>
            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                <p class="text-blue-800 text-sm">
                    <strong>Editorial Inquiries:</strong><br>
                    Please allow 24-48 hours for a response from our research department.
                </p>
            </div>
        </div>

        <div class="mt-12">
            <a href="index.html" class="text-blue-600 font-bold hover:underline">← Back to Home</a>
        </div>
    </main>
</body>
</html>
